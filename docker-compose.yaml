# nginx proxy address - http://172.17.0.1:59088

name: tududi
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: chrisvel/tududi:latest
    container_name: tududi-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      TUDUDI_INTERNAL_SSL_ENABLED: false
      TUDUDI_USER_PASSWORD: ${APP_ADMIN_PASS:-changeme_admin_password}
      TUDUDI_USER_EMAIL: ${APP_ADMIN_USER:-admin}@${BASE_DOMAIN_NAME:-example.com}
      TUDUDI_SESSION_SECRET: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
    ports:
      - '172.17.0.1:59088:9292'
    volumes:
      - './volumes/data/tududi:/usr/src/app/tududi_db'
    networks:
      - tududi

networks:
  tududi:
    name: tududi
    external: false
